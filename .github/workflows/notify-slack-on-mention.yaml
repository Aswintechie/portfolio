name: Notify Slack on Comment or Mention

on:
  issue_comment:
    types: [created]
  issues:
    types: [opened, edited]
  pull_request_target:
    types: [opened, edited]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  notify-slack:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.CODEOWNERS_PING_BOT }}
          SLACK_CHANNEL_ID: "C09HT5VSXRB"
        run: |
          EVENT_NAME="${{ github.event_name }}"
          SENDER="${{ github.event.sender.login }}"
          REPO="${{ github.repository }}"

          if [ "$EVENT_NAME" = "issue_comment" ]; then
            COMMENT_BODY=$(cat <<'EOF'
          ${{ github.event.comment.body }}
          EOF
          )
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            COMMENT_URL="${{ github.event.comment.html_url }}"

            if [ -n "${{ github.event.issue.pull_request }}" ]; then
              CONTEXT_TYPE="PR"
            else
              CONTEXT_TYPE="Issue"
            fi

            TEXT="💬 *New comment* on ${CONTEXT_TYPE} <${COMMENT_URL}|#${ISSUE_NUMBER} - ${ISSUE_TITLE}>\n*Author:* ${SENDER}\n\n${COMMENT_BODY}"

          elif [ "$EVENT_NAME" = "issues" ]; then
            ACTION="${{ github.event.action }}"
            ISSUE_TITLE="${{ github.event.issue.title }}"
            ISSUE_NUMBER="${{ github.event.issue.number }}"
            ISSUE_URL="${{ github.event.issue.html_url }}"
            ISSUE_BODY=$(cat <<'EOF'
          ${{ github.event.issue.body }}
          EOF
          )

            if [ "$ACTION" = "opened" ]; then
              TEXT="📝 *New issue* <${ISSUE_URL}|#${ISSUE_NUMBER} - ${ISSUE_TITLE}>\n*Author:* ${SENDER}\n\n${ISSUE_BODY}"
            else
              TEXT="✏️ *Issue edited* <${ISSUE_URL}|#${ISSUE_NUMBER} - ${ISSUE_TITLE}>\n*Author:* ${SENDER}\n\n${ISSUE_BODY}"
            fi

          elif [ "$EVENT_NAME" = "pull_request_target" ]; then
            ACTION="${{ github.event.action }}"
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            PR_URL="${{ github.event.pull_request.html_url }}"
            PR_BODY=$(cat <<'EOF'
          ${{ github.event.pull_request.body }}
          EOF
          )

            if [ "$ACTION" = "opened" ]; then
              TEXT="🔀 *New PR* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n*Author:* ${SENDER}\n\n${PR_BODY}"
            else
              TEXT="✏️ *PR edited* <${PR_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n*Author:* ${SENDER}\n\n${PR_BODY}"
            fi

          elif [ "$EVENT_NAME" = "pull_request_review_comment" ]; then
            COMMENT_BODY=$(cat <<'EOF'
          ${{ github.event.comment.body }}
          EOF
          )
            PR_TITLE="${{ github.event.pull_request.title }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            COMMENT_URL="${{ github.event.comment.html_url }}"

            TEXT="💬 *New review comment* on PR <${COMMENT_URL}|#${PR_NUMBER} - ${PR_TITLE}>\n*Author:* ${SENDER}\n\n${COMMENT_BODY}"
          fi

          # Truncate if too long for Slack (max ~3000 chars for text field)
          if [ ${#TEXT} -gt 3000 ]; then
            TEXT="${TEXT:0:2990}... _(truncated)_"
          fi

          SLACK_PAYLOAD=$(jq -n \
            --arg channel "$SLACK_CHANNEL_ID" \
            --arg text "$TEXT" \
            '{
              channel: $channel,
              text: $text,
              unfurl_links: false,
              unfurl_media: false
            }')

          SLACK_RESPONSE=$(curl -s --max-time 30 -X POST \
            -H "Authorization: Bearer ${SLACK_BOT_TOKEN}" \
            -H "Content-type: application/json" \
            -d "$SLACK_PAYLOAD" \
            "https://slack.com/api/chat.postMessage")

          if [ "$(echo "$SLACK_RESPONSE" | jq -r '.ok')" = "true" ]; then
            echo "Slack notification sent successfully"
          else
            ERROR=$(echo "$SLACK_RESPONSE" | jq -r '.error // "unknown error"')
            echo "::error::Failed to send Slack notification: $ERROR"
            exit 1
          fi
